name: Update Laravel Docs Reference

on:
  schedule:
    # Run weekly on Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
    # Allow manual trigger

jobs:
  check-updates:
    runs-on: ubuntu-latest
    outputs:
      needs_update: ${{ steps.check.outputs.needs_update }}
      new_version: ${{ steps.check.outputs.new_version }}
      changed_files: ${{ steps.check.outputs.changed_files }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check latest Laravel version
        id: check
        run: |
          # Fetch latest Laravel stable version from GitHub
          LATEST=$(curl -s https://packagist.org/packages/laravel/framework | grep -o '"version_normalized":"[^"]*' | head -1 | sed 's/"version_normalized":"laravel\/framework //' | tr -d '"')
          echo "Latest Laravel: $LATEST"

          # Check if this is a new major/minor
          CURRENT=12
          NEW_MAJOR=$(echo "$LATEST" | cut -d. -f1)
          echo "needs_update=true" >> $GITHUB_OUTPUT
          echo "new_version=$LATEST" >> $GITHUB_OUTPUT
          echo "changed_files=references/version-detection.md,SKILL.md" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.check.outputs.needs_update == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update Laravel docs reference to latest'
          title: 'chore: update Laravel docs reference'
          body: |
            ## Laravel Docs Reference Update

            A new Laravel version has been detected.

            **Latest version**: ${{ steps.check.outputs.new_version }}

            This PR updates the skill's references to reflect the latest Laravel documentation.

            ### Changes
            - Updated `references/version-detection.md`
            - Updated `SKILL.md` default version
            - Reviewed `references/version-diff.md`

            Please review and merge if everything looks correct.

            _Auto-generated by GitHub Actions_
          branch: chore/update-laravel-docs
          delete-branch: true
